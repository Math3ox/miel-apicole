services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: apiculteur_php
    userns_mode: keep-id
    volumes:
      - ./:/var/www/html:z
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - apiculteur

  nginx:
    image: nginx:alpine
    container_name: apiculteur_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro,z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
    depends_on:
      - php
    networks:
      - apiculteur

  mysql:
    image: mysql:8.0
    container_name: apiculteur_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apiculteur

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: apiculteur_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 50M
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - apiculteur

volumes:
  mysql_data:

networks:
  apiculteur:
    driver: bridge

